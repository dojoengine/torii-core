name: docs-sync

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to analyze for documentation updates"
        required: true
        type: string

jobs:
  docs-sync:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    uses: dojoengine/book/.github/workflows/docs-sync.yml@main
    with:
      target-docs-repo: dojoengine/book
      source-repo-slug: dojoengine/torii-core
      diff-globs: |
        *.rs
        *.ts
        *.tsx
        *.proto
        *.toml
        *.md
      docs-patterns: |
        ^crates/.*\.rs$
        ^bins/.*\.rs$
        ^client/.*\.(ts|tsx)$
        ^torii\.js/.*\.(ts|tsx)$
        ^proto/
      canonical-desc: |
        Torii is documented at docs-repo/docs/pages/toolchain/torii/ — this is the single canonical location for torii docs (server, indexer, GraphQL, gRPC, SQL). This repo (torii-core) implements the core indexing primitives used by the full torii indexer.
      docs-structure-desc: |
        The site uses Vocs. Content lives in `docs-repo/docs/pages/`. Navigation is in `docs-repo/routes.ts`. SDK docs at `docs-repo/docs/pages/client/sdk/` are single `.md` files (bevy.md, javascript.md, unity.md, unrealengine.md, godot.md, rust.md, telegram.md), not subdirectories — the sole exception is `c/` which is a subdir.
    secrets: inherit
