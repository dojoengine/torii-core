syntax = "proto3";

package arcade.v1;

service Arcade {
  rpc ListGames (ListGamesRequest) returns (ListGamesResponse);
  rpc ListEditions (ListEditionsRequest) returns (ListEditionsResponse);
  rpc ListCollections (ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc ListListings (ListListingsRequest) returns (ListListingsResponse);
  rpc ListSales (ListSalesRequest) returns (ListSalesResponse);
  rpc GetPlayerInventory (GetPlayerInventoryRequest) returns (GetPlayerInventoryResponse);
}

message Collection {
  bytes collection_id = 1;
  bytes uuid = 2;
  bytes contract_address = 3;
  string name = 4;
  string symbol = 5;
}

message Game {
  bytes game_id = 1;
  bytes entity_id = 2;
  string name = 3;
  string description = 4;
  bool published = 5;
  bool whitelisted = 6;
  string color = 7;
  string image = 8;
  string external_url = 9;
  string animation_url = 10;
  string youtube_url = 11;
  string attributes_json = 12;
  string properties_json = 13;
  string socials_json = 14;
}

message Edition {
  bytes edition_id = 1;
  bytes entity_id = 2;
  bytes game_id = 3;
  bytes world_address = 4;
  bytes namespace = 5;
  string name = 6;
  string description = 7;
  bool published = 8;
  bool whitelisted = 9;
  uint32 priority = 10;
  string config_json = 11;
  string color = 12;
  string image = 13;
  string external_url = 14;
  string animation_url = 15;
  string youtube_url = 16;
  string attributes_json = 17;
  string properties_json = 18;
  string socials_json = 19;
}

message MarketplaceListing {
  uint64 order_id = 1;
  bytes entity_id = 2;
  Collection collection = 3;
  bytes token_id = 4;
  bytes currency = 5;
  bytes owner = 6;
  string price = 7;
  string quantity = 8;
  uint64 expiration = 9;
  uint32 status = 10;
  uint32 category = 11;
  bool royalties = 12;
  uint64 time = 13;
}

message MarketplaceSale {
  uint64 order_id = 1;
  bytes entity_id = 2;
  Collection collection = 3;
  bytes token_id = 4;
  bytes currency = 5;
  bytes seller = 6;
  bytes buyer = 7;
  string price = 8;
  string quantity = 9;
  uint64 expiration = 10;
  uint32 status = 11;
  uint32 category = 12;
  bool royalties = 13;
  uint64 time = 14;
}

message InventoryItem {
  Collection collection = 1;
  bytes token_id = 2;
  bytes owner = 3;
  uint64 last_block = 4;
}

message ListGamesRequest {
  bool include_unpublished = 1;
  bool include_unwhitelisted = 2;
}

message ListGamesResponse {
  repeated Game games = 1;
}

message ListEditionsRequest {
  bytes game_id = 1;
  bool include_unpublished = 2;
  bool include_unwhitelisted = 3;
  uint32 limit = 4;
}

message ListEditionsResponse {
  repeated Edition editions = 1;
}

message ListCollectionsRequest {
  uint32 limit = 1;
}

message ListCollectionsResponse {
  repeated Collection collections = 1;
}

message ListListingsRequest {
  bytes collection_id = 1;
  bytes collection_contract = 2;
  bytes owner = 3;
  bytes currency = 4;
  bool include_inactive = 5;
  uint32 limit = 6;
  uint64 cursor_order_id = 7;
}

message ListListingsResponse {
  repeated MarketplaceListing listings = 1;
  uint64 next_cursor_order_id = 2;
}

message ListSalesRequest {
  bytes collection_id = 1;
  bytes collection_contract = 2;
  bytes account = 3;
  uint32 limit = 4;
  uint64 cursor_order_id = 5;
}

message ListSalesResponse {
  repeated MarketplaceSale sales = 1;
  uint64 next_cursor_order_id = 2;
}

message GetPlayerInventoryRequest {
  bytes owner = 1;
  bytes collection_contract = 2;
  uint32 limit = 3;
  uint64 cursor_block_number = 4;
  int64 cursor_id = 5;
}

message GetPlayerInventoryResponse {
  repeated InventoryItem items = 1;
  uint64 next_cursor_block_number = 2;
  int64 next_cursor_id = 3;
}
