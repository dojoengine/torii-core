name: torii_test
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: torii_test
    ports:
      - "5432:5432"
    volumes:
      - torii_test_pg_data:/var/lib/postgresql

volumes:
  torii_test_pg_data:
